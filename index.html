<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify - Your favourite music is here</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://kit.fontawesome.com/c9a2309f47.js" crossorigin="anonymous"></script>
</head>
<body>
  <nav>
    <ul>
      <li class="brand"><img src="logo.png" alt="spotify">Spotify</li>
      <li>Home</li>
      <li>About</li>
    </ul>
  </nav>

  <div class="container">
    <div class="songlist">
      <h1>Best of NCS - No Copyright Sounds</h1>
      <div class="songItemContainer">

        <div class="songItem">
          <img src="covers/2.jpg" alt="1">
          <span class="songName">Bhool Bhulaiyaa 3</span>
          <span class="songlistplay">
            <span class="timestamp">05:34
              <i class="fa-solid fa-play-circle songItemPlay" id="0"></i>
            </span>
          </span>
        </div>

        <div class="songItem">
          <img src="covers/3.jpg" alt="2">
          <span class="songName">Teri Baaton Mein Uljha Jiya</span>
          <span class="songlistplay">
            <span class="timestamp">04:21
              <i class="fa-solid fa-play-circle songItemPlay" id="1"></i>
            </span>
          </span>
        </div>

        <div class="songItem">
          <img src="covers/4.jpg" alt="3">
          <span class="songName">Jane Tu</span>
          <span class="songlistplay">
            <span class="timestamp">03:50
              <i class="fa-solid fa-play-circle songItemPlay" id="2"></i>
            </span>
          </span>
        </div>

        <div class="songItem">
          <img src="covers/5.jpg" alt="4">
          <span class="songName">Jinda Rahey</span>
          <span class="songlistplay">
            <span class="timestamp">05:10
              <i class="fa-solid fa-play-circle songItemPlay" id="3"></i>
            </span>
          </span>
        </div>

        <div class="songItem">
          <img src="covers/6.jpg" alt="5">
          <span class="songName">Good For Nothing</span>
          <span class="songlistplay">
            <span class="timestamp">04:05
              <i class="fa-solid fa-play-circle songItemPlay" id="4"></i>
            </span>
          </span>
        </div>

        <div class="songItem">
          <img src="covers/7.jpg" alt="6">
          <span class="songName">Koi Itna Khoobsurat</span>
          <span class="songlistplay">
            <span class="timestamp">04:45
              <i class="fa-solid fa-play-circle songItemPlay" id="5"></i>
            </span>
          </span>
        </div>

        <div class="songItem">
          <img src="covers/8.jpg" alt="7">
          <span class="songName">What Jumka?</span>
          <span class="songlistplay">
            <span class="timestamp">03:20
              <i class="fa-solid fa-play-circle songItemPlay" id="6"></i>
            </span>
          </span>
        </div>

        <div class="songItem">
          <img src="covers/9.jpg" alt="8">
          <span class="songName">Ishq Hai</span>
          <span class="songlistplay">
            <span class="timestamp">04:30
              <i class="fa-solid fa-play-circle songItemPlay" id="7"></i>
            </span>
          </span>
        </div>

      </div>
    </div>
    <div class="songBanner"></div>
  </div>

  <div class="bottom">
    <input type="range" name="range" id="myProgressBar" min="0" value="0" max="100">
    <div class="icons">
      <i class="fas fa-2x fa-step-backward" id="previous"></i>
      <i class="fa-solid fa-2x fa-play-circle" id="masterPlay"></i>
      <i class="fas fa-2x fa-step-forward" id="next"></i>
    </div>
    <div class="songInfo">
      <img src="playying gif.gif" width="42px" alt="" id="gif" style="opacity:0;">
      <span id="currentSongName">Select a song</span>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
